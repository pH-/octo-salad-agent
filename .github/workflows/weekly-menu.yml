name: Weekly salad menu

on:
  schedule:
    - cron: "0 16 * * 5"   # Friday 16:00 UTC — adjust to taste
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate menu and build site
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/generate_menu.py
      - name: Commit menu, history, and site
        run: |
          git config user.name "salad-agent"
          git config user.email "actions@github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Menu for next week"
          git push
