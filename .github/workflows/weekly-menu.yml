name: Weekly salad menu

on:
  schedule:
    # Every Friday 16:00 UTC — adjust to your timezone (cron is always UTC)
    - cron: "0 16 * * 5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate menu and send email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python scripts/generate_menu.py

      - name: Commit updated history
        run: |
          git config user.name "salad-agent"
          git config user.email "actions@github.com"
          git add data/history.json
          git diff --cached --quiet || git commit -m "Add menu for next week"
          git push
